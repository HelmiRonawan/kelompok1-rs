openapi: 3.0.3
info:
  title: SIMRS Kelompok 1 — Auth & Pendaftaran API
  description: |
    ## Sistem Informasi Manajemen Rumah Sakit
    ### Kelompok 1: Auth Center & Pendaftaran Pasien

    API ini melayani:
    - **Auth Center**: Login, logout, refresh token untuk **semua kelompok (1-4)**
    - **Register Pasien**: Cukup email + password, verifikasi via OTP Gmail
    - **Pendaftaran Kunjungan**: Langsung (admin perawat) & Online (pasien)
    - **Antrian**: Nomor antrian & pemanggilan per unit

    ### Cara Pakai Token
    ```
    Authorization: Bearer {token}
    ```

    ### Integrasi Kelompok Lain
    | Endpoint | Keterangan |
    |---|---|
    | `POST /api/auth/login` | Login, dapat token |
    | `POST /api/auth/verify-token` | Verifikasi token dari request masuk |
    | `GET /api/units` | Ambil data unit pemeriksaan |
    | `PUT /api/pendaftaran/{id}/status` | Update status saat pasien pindah tahap |

  version: 5.0.0
  contact:
    name: Kelompok 1
    email: freejpgtopng1@gmail.com

servers:
  - url: http://localhost:8000/api
    description: Local Development
  - url: http://IP_VPS:8001/api
    description: VPS Production

tags:
  - name: Auth
    description: Register, login, OTP verifikasi, forgot password
  - name: User Management
    description: CRUD user — Superadmin only
  - name: Pasien
    description: Data pasien
  - name: Pendaftaran
    description: Pendaftaran kunjungan (langsung & online)
  - name: Antrian
    description: Nomor antrian & pemanggilan
  - name: Unit Pemeriksaan
    description: Master data 13 unit — PUBLIC

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string }

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string }

    ValidationError:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: The given data was invalid. }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

    User:
      type: object
      properties:
        id: { type: integer, example: 1 }
        email: { type: string, example: adminperawat@rs.id }
        is_active: { type: boolean, example: true }
        roles:
          type: array
          items: { type: string }
          example: [admin_perawat]

    Pasien:
      type: object
      properties:
        id: { type: integer, example: 1 }
        nomor_rm: { type: string, example: RM-000001 }
        nik: { type: string, example: "3201234567890001" }
        nama_lengkap: { type: string, example: Budi Santoso }
        jenis_kelamin: { type: string, enum: [L, P], example: L }
        tanggal_lahir: { type: string, format: date, example: "1990-05-20" }
        alamat: { type: string, nullable: true }
        no_telepon: { type: string, nullable: true }
        jenis_pasien:   { type: string, enum: [umum, bpjs], example: umum }
        no_bpjs:        { type: string, nullable: true }

    TiketAntrian:
      type: object
      properties:
        nomor_antrian: { type: integer, example: 5 }
        kode_antrian: { type: string, example: A-005 }
        unit: { type: string, example: Mata }
        tanggal: { type: string, format: date }
        nomor_pendaftaran: { type: string, example: PEND-20240115-0005 }

    Antrian:
      type: object
      properties:
        id: { type: integer }
        kode_antrian: { type: string, example: A-001 }
        nomor_antrian: { type: integer, example: 1 }
        status:
          type: string
          enum: [menunggu, pemeriksaan_awal, sedang_diperiksa, selesai_pemeriksaan, lunas, obat_diserahkan]
        tanggal: { type: string, format: date }
        waktu_panggil: { type: string, format: date-time, nullable: true }

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────
paths:
  # ═══════════════════════════════════════════════════════════════════════════
  # AUTH
  # ═══════════════════════════════════════════════════════════════════════════

  /auth/register:
    post:
      tags: [Auth]
      summary: Register pasien mandiri
      description: |
        Register **hanya butuh email + password**.
        Data lengkap pasien (NIK, nama, dll) diisi saat pendaftaran antrian.

        Setelah register → OTP 6 angka dikirim ke Gmail → verifikasi OTP → akun aktif → bisa login.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, password_confirmation]
              properties:
                email:
                  type: string
                  format: email
                  example: budi@gmail.com
      responses:
        "201":
          description: Registrasi berhasil, OTP dikirim ke Gmail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message:
                    {
                      type: string,
                      example: "Registrasi berhasil! Cek email untuk kode OTP verifikasi.",
                    }
                  data:
                    type: object
                    properties:
                      email: { type: string, example: budi@gmail.com }
        "422":
          description: Validasi gagal
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidationError" }

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verifikasi email via OTP 6 angka
      description: |
        Pasien memasukkan OTP yang diterima di Gmail.
        OTP berlaku **10 menit**.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                  format: email
                  example: budi@gmail.com
                password:
                  type: string
                  minLength: 8
                  example: password123
                password_confirmation:
                  type: string
                  example: password123
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
                  example: "482910"
      responses:
        "200":
          description: Email berhasil diverifikasi, akun aktif
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
              example:
                success: true
                message: Email berhasil diverifikasi! Silakan login.
        "422":
          description: OTP tidak valid atau expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/resend-verification:
    post:
      tags: [Auth]
      summary: Kirim ulang OTP verifikasi email
      description: Jika OTP tidak diterima atau expired, minta kirim ulang. OTP baru berlaku 10 menit.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email, example: budi@gmail.com }
      responses:
        "200":
          description: OTP baru dikirim (selalu response sukses)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login — semua kelompok pakai endpoint ini
      description: |
        **Dipakai oleh semua kelompok (1, 2, 3, 4).**

        Login menggunakan **EMAIL** (bukan username).

        ### Remember Me
        | remember_me | Expire Token |
        |---|---|
        | `false` (default) | **60 menit** |
        | `true` | **7 hari** |

        ### Response `has_data_pasien`
        Frontend bisa gunakan ini untuk redirect:
        - `false` → arahkan ke form isi data pasien / daftar antrian langsung
        - `true` → arahkan ke dashboard pasien
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: budi@gmail.com
                password:
                  type: string
                  example: password123
                remember_me:
                  type: boolean
                  default: false
                  example: false
            examples:
              Login Biasa:
                value:
                  {
                    email: adminperawat@rs.id,
                    password: perawat123,
                    remember_me: false,
                  }
              Login Remember Me:
                value:
                  {
                    email: budi@gmail.com,
                    password: password123,
                    remember_me: true,
                  }
              Login Staff Kelompok 2:
                value: { email: dokter01@rs.id, password: dokter123 }
      responses:
        "200":
          description: Login berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: Login berhasil. }
                  data:
                    type: object
                    properties:
                      token: { type: string, example: eyJ0eXAiOiJKV1Qi... }
                      token_type: { type: string, example: Bearer }
                      expires_in:
                        {
                          type: integer,
                          example: 3600,
                          description: dalam detik,
                        }
                      remember_me: { type: boolean, example: false }
                      user:
                        type: object
                        properties:
                          id: { type: integer }
                          email: { type: string }
                          roles: { type: array, items: { type: string } }
                          has_data_pasien:
                            {
                              type: boolean,
                              description: "false = belum punya data pasien, arahkan ke form",
                            }
        "401":
          description: Email atau password salah
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Email belum diverifikasi atau akun tidak aktif
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: false }
                  message: { type: string }
                  action:
                    {
                      type: string,
                      example: resend_verification,
                      description: hint untuk frontend,
                    }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout — invalidate token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logout berhasil
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh token
      description: Perpanjang token sebelum expired. Remember me status dipertahankan.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token baru
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      token: { type: string }
                      token_type: { type: string, example: Bearer }
                      expires_in: { type: integer }
                      remember_me: { type: boolean }

  /auth/me:
    get:
      tags: [Auth]
      summary: Info user yang sedang login
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Data user + info token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      id: { type: integer }
                      email: { type: string }
                      email_verified: { type: boolean }
                      roles: { type: array, items: { type: string } }
                      has_data_pasien: { type: boolean }
                      token_info:
                        type: object
                        properties:
                          remember_me: { type: boolean }
                          expired_at:
                            { type: string, example: "2024-01-15 10:30:00" }

  /auth/verify-token:
    post:
      tags: [Auth]
      summary: Verifikasi token — untuk kelompok 2, 3, 4
      description: |
        **Endpoint ini dipakai kelompok lain untuk memvalidasi token.**

        ### Contoh penggunaan di kelompok lain (Laravel):
        ```php
        $response = Http::withToken($request->bearerToken())
            ->post('http://IP_VPS_KELOMPOK1:8001/api/auth/verify-token');

        if ($response['valid']) {
            $roles = $response['data']['roles'];
        }
        ```
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  valid: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      user_id: { type: integer, example: 5 }
                      nama: { type: string, example: Dr. Budi Santoso }
                      roles:
                        {
                          type: array,
                          items: { type: string },
                          example: [dokter],
                        }
                      expired_at:
                        { type: string, example: "2024-01-15 10:30:00" }
        "401":
          description: Token tidak valid atau expired

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request OTP reset password
      description: OTP 6 angka dikirim ke Gmail. Berlaku **10 menit**.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email, example: budi@gmail.com }
      responses:
        "200":
          description: Selalu sukses (tidak bocorkan info email terdaftar atau tidak)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }

  /auth/check-reset-token:
    post:
      tags: [Auth]
      summary: Validasi OTP reset password
      description: Dipakai frontend untuk cek OTP valid sebelum tampilkan form password baru.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email: { type: string, format: email, example: budi@gmail.com }
                otp:
                  {
                    type: string,
                    minLength: 6,
                    maxLength: 6,
                    example: "123456",
                  }
      responses:
        "200":
          description: OTP valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  valid: { type: boolean, example: true }
                  expired_at: { type: string, example: "2024-01-15 10:30:00" }
        "422":
          description: OTP tidak valid atau expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Submit password baru via OTP
      description: |
        ### Alur lengkap forgot password:
        ```
        1. POST /auth/forgot-password  → OTP dikirim ke Gmail
        2. POST /auth/check-reset-token → validasi OTP (opsional)
        3. POST /auth/reset-password    → submit password baru
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp, password, password_confirmation]
              properties:
                email: { type: string, format: email }
                otp:
                  {
                    type: string,
                    minLength: 6,
                    maxLength: 6,
                    example: "123456",
                  }
                password: { type: string, minLength: 8 }
                password_confirmation: { type: string }
      responses:
        "200":
          description: Password berhasil direset
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        "422":
          description: OTP tidak valid atau expired
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  # ═══════════════════════════════════════════════════════════════════════════
  # USER MANAGEMENT
  # ═══════════════════════════════════════════════════════════════════════════

  /users:
    get:
      tags: [User Management]
      summary: List semua user
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Cari by nama atau email
        - name: role
          in: query
          schema: { type: string }
          example: dokter
      responses:
        "200":
          description: List user dengan pagination
        "403":
          description: Bukan superadmin

    post:
      tags: [User Management]
      summary: Buat user baru — staff semua kelompok
      description: |
        Hanya **superadmin**. Untuk buat akun staff kelompok 1-4.
        Staff **tidak perlu verifikasi email** — langsung aktif.

        ### Role yang tersedia:
        | Role | Kelompok |
        |---|---|
        | superadmin, admin_perawat, pasien | 1 |
        | perawat, dokter | 2 |
        | kasir, admin_kasir | 3 |
        | apoteker, admin_apotik | 4 |
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, roles]
              properties:
                email: { type: string, format: email, example: dokter02@rs.id }
                password: { type: string, minLength: 8, example: dokter123 }
                roles:
                  type: array
                  items: { type: string }
                  example: [dokter]
            examples:
              Buat Dokter:
                value:
                  {
                    email: dokter02@rs.id,
                    password: dokter123,
                    roles: [dokter],
                  }
              Buat Kasir:
                value:
                  {
                    email: kasir02@rs.id,
                    password: kasir123,
                    roles: [kasir],
                  }
              User 2 Role:
                value:
                  {
                    email: staff@rs.id,
                    password: staff123,
                    roles: [perawat, admin_perawat],
                  }
      responses:
        "201":
          description: User berhasil dibuat
        "422":
          description: Email sudah terdaftar atau validasi gagal

  /users/{id}:
    get:
      tags: [User Management]
      summary: Detail user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Data user
        "404":
          description: User tidak ditemukan

    put:
      tags: [User Management]
      summary: Update user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                is_active: { type: boolean }
                roles: { type: array, items: { type: string } }
      responses:
        "200":
          description: User diupdate

    delete:
      tags: [User Management]
      summary: Hapus user (soft delete)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: User dihapus
        "422":
          description: Tidak bisa hapus akun sendiri

  # ═══════════════════════════════════════════════════════════════════════════
  # PASIEN
  # ═══════════════════════════════════════════════════════════════════════════

  /pasien:
    get:
      tags: [Pasien]
      summary: Cari / list pasien
      description: Cari by nama, NIK, atau nomor RM.
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Nama / NIK / nomor RM
      responses:
        "200":
          description: List pasien dengan pagination

  /pasien/cek-nik/{nik}:
    get:
      tags: [Pasien]
      summary: Cek apakah NIK sudah terdaftar
      description: Dipakai sebelum mendaftarkan pasien untuk cek pasien baru atau lama.
      security:
        - bearerAuth: []
      parameters:
        - name: nik
          in: path
          required: true
          schema: { type: string, minLength: 16, maxLength: 16 }
      responses:
        "200":
          description: Hasil cek NIK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  terdaftar: { type: boolean }
                  data: { $ref: "#/components/schemas/Pasien" }
              examples:
                Pasien Lama:
                  value:
                    {
                      success: true,
                      terdaftar: true,
                      data:
                        {
                          id: 1,
                          nomor_rm: RM-000001,
                          nik: "3201234567890001",
                          nama_lengkap: Budi Santoso,
                        },
                    }
                Pasien Baru:
                  value: { success: true, terdaftar: false, data: null }

  /pasien/{id}:
    get:
      tags: [Pasien]
      summary: Detail pasien
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Data pasien lengkap + riwayat pendaftaran

    put:
      tags: [Pasien]
      summary: Update data pasien
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nama_lengkap: { type: string }
                alamat: { type: string }
                no_telepon: { type: string }
                jenis_kelamin: { type: string, enum: [L, P] }
                tanggal_lahir: { type: string, format: date }
      responses:
        "200":
          description: Data diupdate

  # ═══════════════════════════════════════════════════════════════════════════
  # PENDAFTARAN
  # ═══════════════════════════════════════════════════════════════════════════

  /pendaftaran:
    get:
      tags: [Pendaftaran]
      summary: List pendaftaran hari ini
      security:
        - bearerAuth: []
      parameters:
        - name: tanggal
          in: query
          schema: { type: string, format: date }
          description: Default hari ini
        - name: unit_id
          in: query
          schema: { type: integer }
        - name: status
          in: query
          schema:
            type: string
            enum:
              [ 'menunggu',
                'pemeriksaan_awal',
                'sedang_diperiksa',
                'selesai_pemeriksaan',
                'lunas',
                'obat_diserahkan',]
      responses:
        "200":
          description: List pendaftaran

  /pendaftaran/langsung:
    post:
      tags: [Pendaftaran]
      summary: Daftar pasien langsung — Admin Perawat
      description: |
        Admin perawat mendaftarkan pasien yang datang langsung ke RS.

        **Sistem otomatis deteksi pasien baru atau lama by NIK:**
        - NIK **belum ada** di DB → buat data pasien baru otomatis
        - NIK **sudah ada** di DB → pakai data yang sudah ada

        Response berisi **tiket antrian** siap cetak/tampil.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nik, nama_lengkap, tanggal_lahir, unit_id]
              properties:
                nik:
                  type: string
                  minLength: 16
                  maxLength: 16
                  example: "3201234567890001"
                nama_lengkap:
                  type: string
                  example: Budi Santoso
                tanggal_lahir:
                  type: string
                  format: date
                  example: "1990-05-20"
                unit_id:
                  type: integer
                  example: 1
                  description: "1=Mata, 2=Gigi, 3=Penyakit Dalam, dst"
                jenis_kelamin:
                  type: string
                  enum: [L, P]
                  nullable: true
                alamat:
                  type: string
                  nullable: true
                no_telepon:
                  type: string
                  nullable: true
            examples:
              Pasien Baru:
                value:
                  nik: "3201234567890001"
                  nama_lengkap: Budi Santoso
                  tanggal_lahir: "1990-05-20"
                  unit_id: 1
                  jenis_kelamin: L
                  alamat: Jl. Merdeka No. 1
                  no_telepon: "08123456789"
              Pasien Lama (NIK sudah ada):
                value:
                  nik: "3201234567890001"
                  nama_lengkap: Budi Santoso
                  tanggal_lahir: "1990-05-20"
                  unit_id: 2
      responses:
        "201":
          description: Pendaftaran berhasil — tiket antrian siap
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: Pendaftaran berhasil. }
                  data:
                    type: object
                    properties:
                      tiket: { $ref: "#/components/schemas/TiketAntrian" }
                      pasien: { $ref: "#/components/schemas/Pasien" }
        "422":
          description: Pasien sudah terdaftar di unit ini hari ini / unit tidak aktif
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /pendaftaran/online:
    post:
      tags: [Pendaftaran]
      summary: Daftar antrian online — Pasien
      description: |
        Pasien mendaftar sendiri secara online setelah login.

        **Sistem otomatis deteksi pasien baru atau lama by NIK:**

        ### Pasien Baru (NIK belum ada di DB)
        Wajib isi: `nik, nama_lengkap, tanggal_lahir, jenis_kelamin, unit_id`
        Opsional: `alamat, no_telepon`

        ### Pasien Lama (NIK sudah ada di DB)
        Wajib isi: `nik, nama_lengkap, unit_id`
        Opsional: `nomor_rm` (untuk verifikasi tambahan)

        Sistem otomatis verifikasi NIK + nama harus cocok dengan data DB.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nik, nama_lengkap, unit_id]
              properties:
                nik:
                  type: string
                  minLength: 16
                  maxLength: 16
                  example: "3201234567890001"
                nama_lengkap:
                  type: string
                  example: Budi Santoso
                unit_id:
                  type: integer
                  example: 1
                nomor_rm:
                  type: string
                  nullable: true
                  example: RM-000001
                  description: Opsional — untuk verifikasi tambahan pasien lama
                tanggal_lahir:
                  type: string
                  format: date
                  nullable: true
                  example: "1990-05-20"
                  description: Wajib jika pasien baru
                jenis_kelamin:
                  type: string
                  enum: [L, P]
                  nullable: true
                  description: Wajib jika pasien baru
                alamat:
                  type: string
                  nullable: true
                no_telepon:
                  type: string
                  nullable: true
            examples:
              Pasien Baru:
                value:
                  nik: "3201234567890002"
                  nama_lengkap: Siti Rahayu
                  tanggal_lahir: "1995-08-15"
                  jenis_kelamin: P
                  alamat: Jl. Sudirman No. 5
                  no_telepon: "08987654321"
                  unit_id: 2
              Pasien Lama (tanpa nomor RM):
                value:
                  nik: "3201234567890001"
                  nama_lengkap: Budi Santoso
                  unit_id: 3
              Pasien Lama (dengan nomor RM):
                value:
                  nik: "3201234567890001"
                  nama_lengkap: Budi Santoso
                  nomor_rm: RM-000001
                  unit_id: 1
      responses:
        "201":
          description: Pendaftaran berhasil — tiket antrian
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: Pendaftaran berhasil. }
                  data:
                    type: object
                    properties:
                      tiket: { $ref: "#/components/schemas/TiketAntrian" }
                      pasien: { $ref: "#/components/schemas/Pasien" }
        "422":
          description: Data tidak cocok / sudah terdaftar hari ini / unit tidak aktif
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /pendaftaran/{id}:
    get:
      tags: [Pendaftaran]
      summary: Detail pendaftaran
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Detail pendaftaran + antrian + pasien

  /pendaftaran/pasien/{pasienId}/riwayat:
    get:
      tags: [Pendaftaran]
      summary: Riwayat kunjungan pasien
      security:
        - bearerAuth: []
      parameters:
        - name: pasienId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Riwayat kunjungan dengan pagination

  # ═══════════════════════════════════════════════════════════════════════════
  # ANTRIAN
  # ═══════════════════════════════════════════════════════════════════════════

  /antrian:
    get:
      tags: [Antrian]
      summary: List antrian hari ini
      security:
        - bearerAuth: []
      parameters:
        - name: tanggal
          in: query
          schema: { type: string, format: date }
        - name: unit_id
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: List antrian dikelompokkan per unit

  /antrian/unit/{unitId}/display:
    get:
      tags: [Antrian]
      summary: Display monitor antrian (PUBLIC — tidak perlu token)
      description: |
        Tidak perlu token. Untuk **layar monitor di ruang tunggu**.

        Menampilkan:
        - Nomor antrian yang sedang dipanggil
        - 5 antrian berikutnya yang menunggu
        - Statistik hari ini
      parameters:
        - name: unitId
          in: path
          required: true
          schema: { type: integer }
          description: "1=Mata, 2=Gigi, dst"
      responses:
        "200":
          description: Data display monitor
          content:
            application/json:
              schema:
                type: object
                properties:
                  unit: { type: string, example: Mata }
                  tanggal: { type: string, format: date }
                  dipanggil:
                    type: object
                    nullable: true
                    properties:
                      kode: { type: string, example: A-005 }
                      nomor: { type: integer, example: 5 }
                      nama_pasien: { type: string, example: Budi Santoso }
                      waktu_panggil: { type: string, format: date-time }
                  antrian_menunggu:
                    type: array
                    items:
                      type: object
                      properties:
                        kode: { type: string }
                        nomor: { type: integer }
                  statistik:
                    type: object
                    properties:
                      total: { type: integer }
                      selesai: { type: integer }
                      menunggu: { type: integer }

  /antrian/{id}/panggil:
    post:
      tags: [Antrian]
      summary: Panggil nomor antrian tertentu
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Antrian dipanggil
        "422":
          description: Antrian tidak dalam status menunggu

  /antrian/unit/{unitId}/panggil-berikutnya:
    post:
      tags: [Antrian]
      summary: Panggil otomatis antrian berikutnya
      description: Otomatis memanggil nomor terkecil yang masih berstatus menunggu di unit tersebut.
      security:
        - bearerAuth: []
      parameters:
        - name: unitId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Antrian berikutnya dipanggil
        "404":
          description: Tidak ada antrian yang menunggu

  /antrian/{id}/selesai:
    put:
      tags: [Antrian]
      summary: Tandai antrian selesai
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Antrian selesai

  /antrian/saya:
    get:
      tags: [Antrian]
      summary: Lihat antrian sendiri (khusus pasien)
      description: Pasien melihat status antrian mereka hari ini di semua unit.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List antrian pasien hari ini

  # ═══════════════════════════════════════════════════════════════════════════
  # UNIT PEMERIKSAAN
  # ═══════════════════════════════════════════════════════════════════════════

  /units:
    get:
      tags: [Unit Pemeriksaan]
      summary: List semua unit (PUBLIC — tidak perlu token)
      description: |
        Tidak perlu token. Dipakai **semua kelompok** untuk ambil data unit.

        | ID | Kode | Nama |
        |---|---|---|
        | 1 | A | Mata |
        | 2 | B | Gigi |
        | 3 | C | Penyakit Dalam |
        | 4 | D | Jantung |
        | 5 | E | Bedah |
        | 6 | F | KIA |
        | 7 | G | Anak |
        | 8 | H | Rehab Medik |
        | 9 | I | Saraf |
        | 10 | J | Paru |
        | 11 | K | Kulit |
        | 12 | L | THT |
        | 13 | M | Jiwa |
      responses:
        "200":
          description: List unit aktif
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        kode_unit: { type: string }
                        nama_unit: { type: string }

    post:
      tags: [Unit Pemeriksaan]
      summary: Tambah unit baru (Superadmin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kode_unit, nama_unit]
              properties:
                kode_unit: { type: string, maxLength: 10, example: ORTHO }
                nama_unit: { type: string, example: Ortopedi }
                deskripsi: { type: string, nullable: true }
      responses:
        "201":
          description: Unit berhasil ditambahkan
        "422":
          description: Kode unit sudah ada

  /units/{id}:
    get:
      tags: [Unit Pemeriksaan]
      summary: Detail unit (PUBLIC)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Detail unit
        "404":
          description: Unit tidak ditemukan

    put:
      tags: [Unit Pemeriksaan]
      summary: Update unit (Superadmin only)
      description: Bisa dipakai untuk nonaktifkan unit sementara via `is_active = false`.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nama_unit: { type: string }
                deskripsi: { type: string, nullable: true }
                is_active:
                  { type: boolean, description: "false = nonaktifkan unit" }
            examples:
              Ubah Nama:
                value: { nama_unit: Mata & Refraksi }
              Nonaktifkan:
                value: { is_active: false }
              Aktifkan Kembali:
                value: { is_active: true }
      responses:
        "200":
          description: Unit diupdate
        "404":
          description: Unit tidak ditemukan
